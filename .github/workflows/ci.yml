name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  accreditation:
    name: Accreditation fixture suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run accreditation fixture suite
        run: python3 accreditation/validate.py
